<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaQ アルバム</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F8FC;
    --card-bg: #FFFFFF;
    --primary: #6C8EF5;
    --accent1: #FF7EB3;
    --accent2: #FFD166;
    --accent3: #06D6A0;
    --accent4: #FF6B6B;
    --text: #2D3142;
    --text-sub: #8B8FA8;
    --border: #E8EAF2;
    --shadow: 0 4px 24px rgba(108,142,245,0.10);
    --shadow-hover: 0 8px 36px rgba(108,142,245,0.18);
    --radius: 20px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito','Hiragino Sans','Yu Gothic UI',sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── ヘッダー ─── */
  header {
    background: #fff;
    border-bottom: 2px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-hex { width: 38px; height: 38px; }
  .logo-title {
    font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--primary), var(--accent1));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo-sub { font-size: 11px; color: var(--text-sub); font-weight: 600; letter-spacing: 0.5px; margin-top: -4px; }
  header .spacer { flex: 1; }
  .btn-add {
    background: linear-gradient(135deg, var(--primary), #8B6FE8);
    color: #fff; border: none; border-radius: 50px; padding: 10px 20px;
    font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 14px rgba(108,142,245,0.35);
  }
  .btn-add:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,142,245,0.45); }

  /* ─── ツールバー ─── */
  .toolbar { padding: 16px 20px 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .count-badge { background: var(--primary); color: #fff; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 50px; }
  .toolbar-search {
    flex: 1; min-width: 150px; border: 2px solid var(--border); border-radius: 50px;
    padding: 7px 14px; font-size: 13px; font-family: inherit; background: #fff; color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .toolbar-search:focus { border-color: var(--primary); }
  .sort-select {
    border: 2px solid var(--border); border-radius: 50px; padding: 7px 12px;
    font-size: 12px; font-family: inherit; background: #fff; color: var(--text); outline: none; cursor: pointer;
  }

  /* ─── アルバムグリッド ─── */
  .album-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
    gap: 20px; padding: 12px 20px 40px; flex: 1;
  }

  /* ─── 作品カード ─── */
  .work-card {
    background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
    overflow: hidden; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s;
    position: relative; border: 2px solid transparent;
    animation: cardIn 0.3s ease both;
  }
  .work-card:hover { transform: translateY(-4px) scale(1.015); box-shadow: var(--shadow-hover); border-color: var(--primary); }
  .work-card::before {
    content: ''; position: absolute; top: -6px; right: -6px; width: 28px; height: 28px;
    background: var(--accent2); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    z-index: 2; transition: background 0.2s;
  }
  .work-card:hover::before { background: var(--primary); }
  @keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .card-photos { position: relative; height: 180px; overflow: hidden; background: var(--bg); }
  .card-photo-main { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-photo-count {
    position: absolute; bottom: 8px; right: 10px; background: rgba(0,0,0,0.52);
    color: #fff; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 50px;
  }
  .card-3d-badge {
    position: absolute; top: 10px; left: 10px;
    background: linear-gradient(135deg, #6C8EF5, #8B6FE8);
    color: #fff; font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 50px;
    letter-spacing: 0.3px; z-index: 1;
  }
  .card-no-photo {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; color: var(--text-sub);
  }

  .card-body { padding: 14px 16px 16px; }
  .card-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-date { font-size: 11px; color: var(--text-sub); font-weight: 600; margin-bottom: 8px; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 50px; }
  .tag-level { background: #EEF2FF; color: var(--primary); }
  .tag-type  { background: #FFF0F6; color: var(--accent1); }
  .tag-piece { background: #FFFBEB; color: #D97706; }
  .card-memo { font-size: 12px; color: var(--text-sub); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* ─── 空状態 ─── */
  .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-sub); }
  .empty-state h2 { font-size: 18px; font-weight: 800; margin: 16px 0 8px; color: var(--text); }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* ─── モーダル共通 ─── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(30,34,60,0.55); z-index: 200;
    display: flex; align-items: flex-end; justify-content: center; padding: 0;
    animation: fadeIn 0.18s ease;
  }
  .modal-overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .modal-sheet {
    background: #fff; border-radius: 28px 28px 0 0; width: 100%; max-width: 600px;
    max-height: 93vh; overflow-y: auto; padding: 24px 22px 40px;
    animation: slideUp 0.22s cubic-bezier(.22,.68,0,1.2);
  }
  @keyframes slideUp { from { transform:translateY(100px); opacity:0; } to { transform:translateY(0); opacity:1; } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 20px; }
  .modal-title { font-size: 20px; font-weight: 900; margin-bottom: 18px; color: var(--text); }

  /* ─── フォーム ─── */
  .form-section { margin-bottom: 18px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
  .form-input, .form-textarea, .form-select {
    width: 100%; border: 2px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 14px; font-size: 14px; font-family: inherit; color: var(--text);
    background: #fff; outline: none; transition: border-color 0.15s;
  }
  .form-input:focus,.form-textarea:focus,.form-select:focus { border-color: var(--primary); }
  .form-textarea { min-height: 80px; resize: vertical; }

  .photo-upload-area {
    border: 2.5px dashed var(--border); border-radius: var(--radius-sm); padding: 18px;
    text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: var(--bg);
  }
  .photo-upload-area:hover { border-color: var(--primary); background: #EEF2FF; }
  .photo-upload-area p { font-size: 13px; color: var(--text-sub); margin-top: 8px; font-weight: 600; }
  .photo-upload-area small { font-size: 11px; color: #b0b3c8; }
  #photo-input, #model-input { display: none; }

  .photo-previews { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 10px; }
  .photo-thumb-wrap { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1; }
  .photo-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-thumb-del {
    position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.55); color: #fff;
    border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1;
  }

  /* 3Dファイルアップロード */
  .model-upload-area {
    border: 2.5px dashed #C7D3FF; border-radius: var(--radius-sm); padding: 16px;
    text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    background: #F0F4FF;
  }
  .model-upload-area:hover { border-color: var(--primary); background: #EEF2FF; }
  .model-upload-area p { font-size: 13px; color: var(--primary); margin-top: 8px; font-weight: 700; }
  .model-upload-area small { font-size: 11px; color: #8B8FA8; }
  .model-file-info {
    margin-top: 10px; background: #EEF2FF; border-radius: 10px; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .model-file-info span { font-size: 13px; font-weight: 700; color: var(--primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .model-file-del { background: none; border: none; color: var(--accent4); font-size: 18px; cursor: pointer; padding: 0 2px; }

  .piece-counts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .piece-row { display: flex; align-items: center; gap: 8px; background: var(--bg); border-radius: var(--radius-sm); padding: 8px 10px; }
  .piece-color-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.08); }
  .piece-row label { font-size: 12px; font-weight: 700; color: var(--text-sub); flex: 1; }
  .piece-row input { width: 52px; border: 2px solid var(--border); border-radius: 8px; padding: 4px 6px; font-size: 13px; font-family: inherit; text-align: center; outline: none; }
  .piece-row input:focus { border-color: var(--primary); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-row { display: flex; gap: 10px; margin-top: 6px; }
  .btn-cancel {
    flex: 1; border: 2px solid var(--border); background: #fff; color: var(--text-sub);
    border-radius: 50px; padding: 12px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.12s;
  }
  .btn-cancel:hover { background: var(--bg); }
  .btn-save {
    flex: 2; background: linear-gradient(135deg, var(--primary), #8B6FE8); color: #fff;
    border: none; border-radius: 50px; padding: 12px; font-size: 14px; font-weight: 800;
    font-family: inherit; cursor: pointer; box-shadow: 0 4px 14px rgba(108,142,245,0.35); transition: transform 0.12s;
  }
  .btn-save:hover { transform: translateY(-1px); }

  /* ─── 詳細モーダル ─── */

  /* タブ */
  .detail-tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    background: var(--bg); border-radius: 12px; padding: 4px;
  }
  .detail-tab {
    flex: 1; padding: 8px 10px; border: none; background: transparent;
    border-radius: 9px; font-size: 13px; font-weight: 700; font-family: inherit;
    cursor: pointer; color: var(--text-sub); transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .detail-tab.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(108,142,245,0.15); }

  /* 写真パネル */
  .detail-photo-panel {}
  .detail-photos {
    display: flex; gap: 8px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 4px; scrollbar-width: none;
  }
  .detail-photos::-webkit-scrollbar { display: none; }
  .detail-photo-item {
    flex-shrink: 0; width: 80px; height: 80px; border-radius: 10px; overflow: hidden;
    cursor: pointer; border: 2.5px solid transparent; transition: border-color 0.15s;
  }
  .detail-photo-item.active { border-color: var(--primary); }
  .detail-photo-item img { width: 100%; height: 100%; object-fit: cover; }
  .detail-main-photo {
    width: 100%; height: 260px; object-fit: cover; border-radius: 16px; margin-bottom: 12px;
    display: block; cursor: zoom-in;
  }
  .detail-main-placeholder {
    width: 100%; height: 200px; background: var(--bg); border-radius: 16px;
    display: flex; align-items: center; justify-content: center; color: var(--text-sub); margin-bottom: 14px; font-size: 13px;
  }

  /* 3Dパネル */
  .detail-3d-panel { display: none; }
  .detail-3d-panel.active-panel { display: block; }
  .detail-photo-panel.active-panel { display: block; }
  .detail-photo-panel { display: none; }

  #viewer-canvas-wrap {
    width: 100%; height: 300px; border-radius: 16px; overflow: hidden;
    background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    position: relative; margin-bottom: 12px; cursor: grab;
  }
  #viewer-canvas-wrap:active { cursor: grabbing; }
  #viewer-canvas-wrap canvas { width: 100% !important; height: 100% !important; display: block; }
  .viewer-hint {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.45); color: rgba(255,255,255,0.8);
    font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 50px;
    pointer-events: none; white-space: nowrap;
  }
  .viewer-controls {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 14px;
  }
  .viewer-btn {
    background: var(--bg); border: 2px solid var(--border); border-radius: 50px;
    padding: 6px 14px; font-size: 12px; font-weight: 700; font-family: inherit;
    cursor: pointer; color: var(--text); transition: background 0.12s, border-color 0.12s;
  }
  .viewer-btn:hover { background: #EEF2FF; border-color: var(--primary); color: var(--primary); }
  .viewer-loading {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: rgba(255,255,255,0.7);
    gap: 12px; font-size: 13px; font-weight: 600;
  }
  .viewer-spinner {
    width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .viewer-no-model {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    color: rgba(255,255,255,0.45); font-size: 13px; font-weight: 600;
  }

  /* 詳細 共通 */
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
  .detail-name { font-size: 22px; font-weight: 900; color: var(--text); line-height: 1.2; }
  .detail-date-level { font-size: 12px; color: var(--text-sub); font-weight: 600; margin-top: 4px; }
  .btn-edit-detail {
    background: var(--bg); border: 2px solid var(--border); border-radius: 50px;
    padding: 7px 14px; font-size: 12px; font-weight: 700; font-family: inherit;
    cursor: pointer; color: var(--text); flex-shrink: 0; transition: background 0.12s;
  }
  .btn-edit-detail:hover { background: var(--border); }
  .detail-section { background: var(--bg); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 12px; }
  .detail-section-title { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; margin-bottom: 10px; text-transform: uppercase; }
  .detail-memo { font-size: 14px; color: var(--text); line-height: 1.7; }
  .piece-stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .piece-stat { background: #fff; border-radius: 10px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
  .piece-stat .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.08); }
  .piece-stat-name { font-size: 10px; color: var(--text-sub); font-weight: 700; flex: 1; }
  .piece-stat-val { font-size: 14px; font-weight: 800; color: var(--text); }
  .piece-total { margin-top: 10px; text-align: right; font-size: 13px; font-weight: 700; color: var(--primary); }

  .ai-analysis {
    background: linear-gradient(135deg,#EEF2FF 0%,#FFF0F6 100%);
    border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 12px; border: 1.5px solid #E0E7FF;
  }
  .ai-analysis-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ai-badge { background: linear-gradient(135deg,var(--primary),var(--accent1)); color: #fff; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 50px; letter-spacing: 0.5px; }
  .ai-analysis-title { font-size: 13px; font-weight: 800; color: var(--text); }
  .ai-analysis-body { font-size: 13px; color: var(--text); line-height: 1.7; }
  .btn-ai {
    background: linear-gradient(135deg,var(--primary),var(--accent1)); color: #fff;
    border: none; border-radius: 50px; padding: 8px 16px; font-size: 12px; font-weight: 700;
    font-family: inherit; cursor: pointer; margin-top: 8px; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s;
  }
  .btn-ai:hover { opacity: 0.88; }
  .btn-ai:disabled { opacity: 0.5; cursor: not-allowed; }
  .ai-loading { display: none; }
  .ai-loading.show { display: inline-block; }
  .btn-delete {
    width: 100%; background: #fff; border: 2px solid #FFE0E0; color: var(--accent4);
    border-radius: 50px; padding: 11px; font-size: 13px; font-weight: 700; font-family: inherit;
    cursor: pointer; margin-top: 4px; transition: background 0.12s;
  }
  .btn-delete:hover { background: #FFF5F5; }

  /* ─── ライトボックス ─── */
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 400; display: flex; align-items: center; justify-content: center; }
  .lightbox.hidden { display: none; }
  .lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 10px; object-fit: contain; }
  .lightbox-close { position: absolute; top: 16px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; background: none; border: none; line-height: 1; }

  /* ─── フッター ─── */
  footer { text-align: center; padding: 14px; font-size: 11px; color: var(--text-sub); font-weight: 700; letter-spacing: 1px; border-top: 1.5px solid var(--border); background: #fff; }

  @media (max-width: 480px) {
    .album-grid { grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 12px 40px; }
    .card-photos { height: 140px; }
    header { padding: 12px 14px; }
    .btn-add span { display: none; }
    .modal-sheet { padding: 20px 16px 36px; }
    .form-row { grid-template-columns: 1fr; }
    .piece-counts { grid-template-columns: 1fr 1fr; }
    #viewer-canvas-wrap { height: 240px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-hex" viewBox="0 0 38 38" fill="none">
      <polygon points="19,2 35,10 35,28 19,36 3,28 3,10" fill="url(#hg)"/>
      <defs>
        <linearGradient id="hg" x1="0" y1="0" x2="38" y2="38" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#6C8EF5"/><stop offset="100%" stop-color="#FF7EB3"/>
        </linearGradient>
      </defs>
      <text x="19" y="24" text-anchor="middle" fill="#fff" font-size="13" font-weight="900" font-family="Nunito,sans-serif">La</text>
    </svg>
    <div>
      <div class="logo-title">LaQ アルバム</div>
      <div class="logo-sub">作品記録 &amp; 設計図</div>
    </div>
  </div>
  <div class="spacer"></div>
  <button class="btn-add" id="btn-open-add">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
    <span>作品を追加</span>
  </button>
</header>

<div class="toolbar">
  <span class="count-badge" id="count-badge">0 作品</span>
  <input class="toolbar-search" id="search-input" type="text" placeholder="🔍 作品名・メモで検索">
  <select class="sort-select" id="sort-select">
    <option value="newest">新しい順</option>
    <option value="oldest">古い順</option>
    <option value="name">名前順</option>
    <option value="pieces">ピース数順</option>
  </select>
</div>

<div class="album-grid" id="album-grid"></div>

<!-- ─── 追加/編集モーダル ─── -->
<div class="modal-overlay hidden" id="add-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-form-title">✨ 新しい作品を登録</div>

    <div class="form-section">
      <label class="form-label">📸 写真（複数枚OK）</label>
      <div class="photo-upload-area" id="photo-upload-area">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect x="2" y="8" width="32" height="24" rx="5" stroke="#8B8FA8" stroke-width="2"/>
          <circle cx="18" cy="20" r="6" stroke="#8B8FA8" stroke-width="2"/>
          <path d="M13 8l2-4h6l2 4" stroke="#8B8FA8" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <p>タップして写真を選択</p>

<!-- Three.js + loaders CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Three.js Loaders (インライン軽量実装) ───
// GLTFLoader・OBJLoader・STLLoader を CDN から動的ロード
const LOADER_URLS = {
  gltf: 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js',
  obj:  'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js',
  stl:  'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js',
};
const loadedScripts = {};
function loadScript(url) {
  if (loadedScripts[url]) return loadedScripts[url];
  loadedScripts[url] = new Promise((res, rej) => {
    const s = document.createElement('script'); s.src = url;
    s.onload = res; s.onerror = rej; document.head.appendChild(s);
  });
  return loadedScripts[url];
}

// ─── データ管理 ───
const STORAGE_KEY = 'laq_album_v2';
function loadWorks() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function saveWorks(w) { localStorage.setItem(STORAGE_KEY, JSON.stringify(w)); }

let works = loadWorks();
let editingId = null;
let pendingPhotos = [];
let pendingModelData = null; // {dataUrl, name, ext}
let currentDetailId = null;
let currentDetailPhotoIdx = 0;

// ─── Three.js ビューア状態 ───
let renderer = null, scene = null, camera = null;
let viewerModel = null, animFrameId = null;
let isAutoRotate = false, isWireframe = false;
let isDragging = false, prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0.3, phi: 1.2, radius: 3 };
let touchPrev = null;

// ─── ピース色 ───
const PIECE_TYPES = [
  {key:'white',  label:'白',    color:'#FFFFFF', border:'#ccc'},
  {key:'yellow', label:'黄',    color:'#FFD166'},
  {key:'orange', label:'橙',    color:'#F4845F'},
  {key:'red',    label:'赤',    color:'#FF6B6B'},
  {key:'pink',   label:'ピンク',color:'#FF7EB3'},
  {key:'purple', label:'紫',    color:'#9B59B6'},
  {key:'blue',   label:'青',    color:'#4A90D9'},
  {key:'lblue',  label:'水色',  color:'#74C9E5'},
  {key:'green',  label:'緑',    color:'#06D6A0'},
  {key:'lgreen', label:'黄緑',  color:'#A8E63D'},
  {key:'brown',  label:'茶',    color:'#8B5E3C'},
  {key:'black',  label:'黒',    color:'#2D3142'},
  {key:'clear',  label:'透明',  color:'#E8F4FD', border:'#74C9E5'},
  {key:'other',  label:'その他',color:'#E8EAF2', border:'#8B8FA8'},
];

function renderPieceInputs(data={}) {
  document.getElementById('piece-counts').innerHTML = PIECE_TYPES.map(p => `
    <div class="piece-row">
      <div class="piece-color-dot" style="background:${p.color};border-color:${p.border||'transparent'}"></div>
      <label>${p.label}</label>
      <input type="number" min="0" value="${data[p.key]||''}" placeholder="0" id="piece-${p.key}">
    </div>`).join('');
}

function getPieceCounts() {
  const res = {};
  PIECE_TYPES.forEach(p => { const v = parseInt(document.getElementById(`piece-${p.key}`).value)||0; if(v>0) res[p.key]=v; });
  return res;
}

function totalPieces(pieces) { if(!pieces) return 0; return Object.values(pieces).reduce((s,v)=>s+v,0); }
function formatDate(d) { if(!d) return ''; const dt=new Date(d); return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`; }
function escHtml(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── アルバム描画 ───
function renderAlbum() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const sort = document.getElementById('sort-select').value;
  let list = works.filter(w => !q || w.name.toLowerCase().includes(q) || (w.memo||'').toLowerCase().includes(q));
  if(sort==='newest') list=[...list].sort((a,b)=>b.createdAt-a.createdAt);
  else if(sort==='oldest') list=[...list].sort((a,b)=>a.createdAt-b.createdAt);
  else if(sort==='name') list=[...list].sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  else if(sort==='pieces') list=[...list].sort((a,b)=>totalPieces(b.pieces)-totalPieces(a.pieces));

  const grid = document.getElementById('album-grid');
  document.getElementById('count-badge').textContent = `${list.length} 作品`;

  if(list.length===0) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><polygon points="32,4 58,17 58,47 32,60 6,47 6,17" fill="#EEF2FF"/><text x="32" y="38" text-anchor="middle" fill="#6C8EF5" font-size="22" font-weight="900" font-family="Nunito,sans-serif">La</text></svg>
      <h2>${q?'作品が見つかりません':'まだ作品がありません'}</h2>
      <p>${q?'別のキーワードで検索してみてください':'「作品を追加」ボタンから<br>LaQ作品を登録しましょう！'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map((w,i) => {
    const photo = w.photos&&w.photos[0];
    const total = totalPieces(w.pieces);
    return `
    <div class="work-card" style="animation-delay:${i*0.04}s" data-id="${w.id}">
      <div class="card-photos">
        ${photo ? `<img class="card-photo-main" src="${photo}" alt="${w.name}">` :
          `<div class="card-no-photo"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect x="2" y="6" width="32" height="24" rx="5" stroke="#8B8FA8" stroke-width="2"/><circle cx="18" cy="18" r="6" stroke="#8B8FA8" stroke-width="2"/></svg><span style="font-size:11px">写真なし</span></div>`}
        ${w.modelData ? `<div class="card-3d-badge">🧊 3D</div>` : ''}
        ${w.photos&&w.photos.length>1 ? `<div class="card-photo-count">📷 ${w.photos.length}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(w.name)||'無題'}</div>
        <div class="card-date">${formatDate(w.date)}</div>
        <div class="card-tags">
          ${w.level?`<span class="tag tag-level">${w.level}`:''}${w.level?'</span>':''}
          ${w.type?`<span class="tag tag-type">${w.type}</span>`:''}
          ${total?`<span class="tag tag-piece">🧩 ${total}個</span>`:''}
          ${w.time?`<span class="tag tag-piece">⏱ ${escHtml(w.time)}</span>`:''}
        </div>
        ${w.memo?`<div class="card-memo">${escHtml(w.memo)}</div>`:''}
      </div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.work-card').forEach(el => el.addEventListener('click', ()=>openDetail(el.dataset.id)));
}

// ─── 追加/編集モーダル ───
function openAddModal() {
  editingId=null; pendingPhotos=[]; pendingModelData=null;
  document.getElementById('modal-form-title').textContent='✨ 新しい作品を登録';
  ['f-name','f-date','f-level','f-type','f-time','f-memo'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value = id==='f-date'?new Date().toISOString().slice(0,10):'';
  });
  document.getElementById('photo-previews').innerHTML='';
  document.getElementById('model-file-preview').innerHTML='';
  renderPieceInputs();
  document.getElementById('add-modal').classList.remove('hidden');
}

function openEditModal(id) {
  const w=works.find(x=>x.id===id); if(!w) return;
  editingId=id;
  pendingPhotos=(w.photos||[]).map((d,i)=>({dataUrl:d,name:`photo${i}`}));
  pendingModelData = w.modelData ? {...w.modelData} : null;
  document.getElementById('modal-form-title').textContent='✏️ 作品を編集';
  document.getElementById('f-name').value=w.name||'';
  document.getElementById('f-date').value=w.date||'';
  document.getElementById('f-level').value=w.level||'';
  document.getElementById('f-type').value=w.type||'';
  document.getElementById('f-time').value=w.time||'';
  document.getElementById('f-memo').value=w.memo||'';
  renderPieceInputs(w.pieces||{});
  renderPendingPreviews();
  renderModelFileInfo();
  document.getElementById('add-modal').classList.remove('hidden');
}

function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }

document.getElementById('btn-open-add').addEventListener('click', openAddModal);
document.getElementById('btn-cancel-add').addEventListener('click', closeAddModal);
document.getElementById('add-modal').addEventListener('click', e=>{if(e.target===document.getElementById('add-modal'))closeAddModal();});

// 写真
document.getElementById('photo-upload-area').addEventListener('click', ()=>document.getElementById('photo-input').click());
document.getElementById('photo-input').addEventListener('change', e=>{
  const files=Array.from(e.target.files);
  Promise.all(files.map(f=>new Promise(res=>{const r=new FileReader();r.onload=ev=>res({dataUrl:ev.target.result,name:f.name});r.readAsDataURL(f);}))).then(rs=>{pendingPhotos=[...pendingPhotos,...rs];renderPendingPreviews();});
  e.target.value='';
});

function renderPendingPreviews() {
  const c=document.getElementById('photo-previews');
  c.innerHTML=pendingPhotos.map((p,i)=>`
    <div class="photo-thumb-wrap">
      <img src="${p.dataUrl}" alt="">
      <button class="photo-thumb-del" data-idx="${i}">×</button>
    </div>`).join('');
  c.querySelectorAll('.photo-thumb-del').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();pendingPhotos.splice(parseInt(btn.dataset.idx),1);renderPendingPreviews();}));
}

// 3Dファイル
document.getElementById('model-upload-area').addEventListener('click', ()=>document.getElementById('model-input').click());
document.getElementById('model-input').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  const ext=file.name.split('.').pop().toLowerCase();
  const r=new FileReader();
  r.onload=ev=>{
    pendingModelData={dataUrl:ev.target.result, name:file.name, ext};
    renderModelFileInfo();
  };
  if(['glb','gltf','stl'].includes(ext)) r.readAsDataURL(file);
  else r.readAsText(file); // obj
  e.target.value='';
});

function renderModelFileInfo() {
  const c=document.getElementById('model-file-preview');
  if(!pendingModelData) { c.innerHTML=''; return; }
  c.innerHTML=`<div class="model-file-info">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L18 6v8L10 18 2 14V6L10 2z" stroke="#6C8EF5" stroke-width="1.5" stroke-linejoin="round"/></svg>
    <span>${escHtml(pendingModelData.name)}</span>
    <button class="model-file-del" id="model-del-btn">×</button>
  </div>`;
  document.getElementById('model-del-btn').addEventListener('click',()=>{pendingModelData=null;renderModelFileInfo();});
}

// 保存
document.getElementById('btn-save-work').addEventListener('click', ()=>{
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('作品名を入力してください');return;}
  const w={
    id: editingId||`w${Date.now()}`,
    name,
    date: document.getElementById('f-date').value,
    level: document.getElementById('f-level').value,
    type: document.getElementById('f-type').value,
    time: document.getElementById('f-time').value.trim(),
    memo: document.getElementById('f-memo').value.trim(),
    pieces: getPieceCounts(),
    photos: pendingPhotos.map(p=>p.dataUrl),
    modelData: pendingModelData,
    createdAt: editingId?(works.find(x=>x.id===editingId)?.createdAt||Date.now()):Date.now(),
    aiAnalysis: editingId?(works.find(x=>x.id===editingId)?.aiAnalysis||null):null,
  };
  if(editingId){const idx=works.findIndex(x=>x.id===editingId);works[idx]=w;}
  else works.unshift(w);
  saveWorks(works);
  closeAddModal();
  renderAlbum();
  if(editingId&&currentDetailId===editingId) openDetail(editingId);
});

// ─── 詳細モーダル ───
let currentTab = 'photo';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-photo').classList.toggle('active', tab==='photo');
  document.getElementById('tab-3d').classList.toggle('active', tab==='3d');
  document.getElementById('panel-photo').classList.toggle('active-panel', tab==='photo');
  document.getElementById('panel-3d').classList.toggle('active-panel', tab==='3d');
  if(tab==='3d') { setTimeout(()=>initViewer(), 50); }
  else { disposeRenderer(); }
}

document.getElementById('detail-tabs').addEventListener('click', e=>{
  const btn=e.target.closest('.detail-tab'); if(!btn) return;
  switchTab(btn.dataset.tab);
});

function openDetail(id) {
  const w=works.find(x=>x.id===id); if(!w) return;
  currentDetailId=id; currentDetailPhotoIdx=0;

  // タブリセット
  switchTab('photo');
  // 3Dタブの表示制御
  document.getElementById('tab-3d').style.display = w.modelData ? '' : '';
  document.getElementById('tab-3d').disabled = !w.modelData;
  document.getElementById('tab-3d').style.opacity = w.modelData ? '' : '0.4';

  // 写真
  const mw=document.getElementById('detail-main-photo-wrap');
  if(w.photos&&w.photos.length>0) {
    mw.innerHTML=`<img class="detail-main-photo" id="detail-main-img" src="${w.photos[0]}" alt="${w.name}">`;
    document.getElementById('detail-main-img').addEventListener('click',()=>openLightbox(w.photos[currentDetailPhotoIdx]));
  } else {
    mw.innerHTML=`<div class="detail-main-placeholder">📷 写真なし</div>`;
  }

  const thumbs=document.getElementById('detail-photos');
  if(w.photos&&w.photos.length>1) {
    thumbs.innerHTML=w.photos.map((p,i)=>`<div class="detail-photo-item ${i===0?'active':''}" data-idx="${i}"><img src="${p}" alt=""></div>`).join('');
    thumbs.querySelectorAll('.detail-photo-item').forEach(el=>{
      el.addEventListener('click',()=>{
        currentDetailPhotoIdx=parseInt(el.dataset.idx);
        thumbs.querySelectorAll('.detail-photo-item').forEach(x=>x.classList.remove('active'));
        el.classList.add('active');
        const img=document.getElementById('detail-main-img'); if(img) img.src=w.photos[currentDetailPhotoIdx];
      });
    });
  } else { thumbs.innerHTML=''; }

  document.getElementById('d-name').textContent=w.name||'無題';
  document.getElementById('d-meta').textContent=[formatDate(w.date),w.time?`制作時間: ${w.time}`:''].filter(Boolean).join('　·　');
  document.getElementById('d-tags').innerHTML=[w.level?`<span class="tag tag-level">${w.level}</span>`:'',w.type?`<span class="tag tag-type">${w.type}</span>`:''].join('');

  const total=totalPieces(w.pieces);
  const ps=document.getElementById('d-piece-section');
  if(total>0) {
    ps.style.display='';
    document.getElementById('d-pieces').innerHTML=PIECE_TYPES.filter(p=>w.pieces[p.key]).map(p=>`
      <div class="piece-stat">
        <div class="dot" style="background:${p.color};border-color:${p.border||'transparent'}"></div>
        <span class="piece-stat-name">${p.label}</span>
        <span class="piece-stat-val">${w.pieces[p.key]}</span>
      </div>`).join('');
    document.getElementById('d-piece-total').textContent=`合計 ${total} 個`;
  } else { ps.style.display='none'; }

  const ms=document.getElementById('d-memo-section');
  if(w.memo){ms.style.display='';document.getElementById('d-memo').textContent=w.memo;}else ms.style.display='none';

  const ais=document.getElementById('ai-section');
  if(w.photos&&w.photos.length>0) {
    ais.style.display='';
    if(w.aiAnalysis){document.getElementById('ai-body').innerHTML=w.aiAnalysis;document.getElementById('ai-btn-text').textContent='🔄 再解析する';}
    else{document.getElementById('ai-body').textContent='写真からAIが作品の構造・特徴・再現ヒントを解析します。';document.getElementById('ai-btn-text').textContent='✨ AI で解析する';}
    document.getElementById('btn-ai-analyze').disabled=false;
  } else ais.style.display='none';

  document.getElementById('detail-modal').classList.remove('hidden');
}

// ─── Three.js ビューア ───
function disposeRenderer() {
  if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
  if(renderer){renderer.dispose();renderer=null;}
  if(scene){
    scene.traverse(obj=>{
      if(obj.geometry) obj.geometry.dispose();
      if(obj.material){
        if(Array.isArray(obj.material)) obj.material.forEach(m=>m.dispose());
        else obj.material.dispose();
      }
    });
    scene=null;
  }
  camera=null; viewerModel=null; isAutoRotate=false; isWireframe=false;
  const wrap=document.getElementById('viewer-canvas-wrap');
  const c=wrap.querySelector('canvas'); if(c) c.remove();
}

async function initViewer() {
  const w=works.find(x=>x.id===currentDetailId); if(!w||!w.modelData) {
    document.getElementById('viewer-no-model').style.display='';
    document.getElementById('viewer-controls').style.display='none';
    return;
  }

  disposeRenderer();
  const wrap=document.getElementById('viewer-canvas-wrap');
  document.getElementById('viewer-loading').style.display='';
  document.getElementById('viewer-no-model').style.display='none';
  document.getElementById('viewer-controls').style.display='none';

  try {
    const ext=w.modelData.ext;
    if(['glb','gltf'].includes(ext)) await loadScript(LOADER_URLS.gltf);
    else if(ext==='obj') await loadScript(LOADER_URLS.obj);
    else if(ext==='stl') await loadScript(LOADER_URLS.stl);
  } catch(e) {
    document.getElementById('viewer-loading').innerHTML='<span style="color:#FF7EB3">ローダーの読み込みに失敗しました</span>';
    return;
  }

  // シーン構築
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x1a1a2e);
  camera=new THREE.PerspectiveCamera(45, wrap.clientWidth/wrap.clientHeight, 0.01, 1000);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.shadowMap.enabled=true;
  wrap.appendChild(renderer.domElement);

  // ライト
  const amb=new THREE.AmbientLight(0xffffff,0.6); scene.add(amb);
  const dir=new THREE.DirectionalLight(0xffffff,0.8); dir.position.set(5,8,5); scene.add(dir);
  const dir2=new THREE.DirectionalLight(0x8888ff,0.3); dir2.position.set(-5,3,-5); scene.add(dir2);

  // グリッド
  const grid=new THREE.GridHelper(4,10,0x333355,0x222244); scene.add(grid);

  // モデルロード
  try {
    const model=await loadModel(w.modelData);
    viewerModel=model;
    scene.add(model);

    // バウンディングボックスでカメラ調整
    const box=new THREE.Box3().setFromObject(model);
    const center=box.getCenter(new THREE.Vector3());
    const size=box.getSize(new THREE.Vector3());
    const maxDim=Math.max(size.x,size.y,size.z);
    model.position.sub(center);
    model.position.y+=size.y/2;
    spherical.radius=maxDim*1.8;
    camera.near=maxDim*0.001;
    camera.far=maxDim*100;
    camera.updateProjectionMatrix();

    document.getElementById('viewer-loading').style.display='none';
    document.getElementById('viewer-controls').style.display='';
    setupViewerEvents(wrap);
    animateViewer();
  } catch(err) {
    document.getElementById('viewer-loading').innerHTML=`<span style="color:#FF7EB3">読み込みエラー: ${err.message}</span>`;
  }
}

function loadModel(modelData) {
  return new Promise((resolve,reject)=>{
    const {dataUrl,ext}=modelData;

    if(ext==='stl') {
      const loader=new THREE.STLLoader();
      loader.load(dataUrl, geo=>{
        const mat=new THREE.MeshPhongMaterial({color:0x6C8EF5, specular:0x333333, shininess:60});
        resolve(new THREE.Mesh(geo,mat));
      }, undefined, reject);
    }
    else if(ext==='obj') {
      // OBJはテキストとして読み込まれている
      const loader=new THREE.OBJLoader();
      try {
        // dataUrlがテキストの場合はパース
        let objText=dataUrl;
        if(dataUrl.startsWith('data:')) {
          const b64=dataUrl.split(',')[1];
          objText=atob(b64);
        }
        const obj=loader.parse(objText);
        obj.traverse(child=>{
          if(child.isMesh) child.material=new THREE.MeshPhongMaterial({color:0x6C8EF5,specular:0x333333,shininess:60});
        });
        resolve(obj);
      } catch(e){ reject(e); }
    }
    else { // glb/gltf
      const loader=new THREE.GLTFLoader();
      loader.load(dataUrl, gltf=>{
        resolve(gltf.scene);
      }, undefined, reject);
    }
  });
}

function updateCamera() {
  if(!camera) return;
  const x=spherical.radius*Math.sin(spherical.phi)*Math.sin(spherical.theta);
  const y=spherical.radius*Math.cos(spherical.phi);
  const z=spherical.radius*Math.sin(spherical.phi)*Math.cos(spherical.theta);
  camera.position.set(x,y,z);
  camera.lookAt(0,0,0);
}

function animateViewer() {
  animFrameId=requestAnimationFrame(animateViewer);
  if(isAutoRotate) spherical.theta+=0.008;
  updateCamera();
  if(renderer&&scene&&camera) renderer.render(scene,camera);
}

function setupViewerEvents(wrap) {
  // マウス
  wrap.addEventListener('mousedown', e=>{ isDragging=true; prevMouse={x:e.clientX,y:e.clientY}; });
  window.addEventListener('mouseup', ()=>{ isDragging=false; });
  window.addEventListener('mousemove', e=>{
    if(!isDragging)return;
    const dx=e.clientX-prevMouse.x, dy=e.clientY-prevMouse.y;
    spherical.theta-=dx*0.008;
    spherical.phi=Math.max(0.1,Math.min(Math.PI-0.1,spherical.phi+dy*0.008));
    prevMouse={x:e.clientX,y:e.clientY};
  });
  wrap.addEventListener('wheel', e=>{ e.preventDefault(); spherical.radius=Math.max(0.1,spherical.radius*(1+e.deltaY*0.001)); },{passive:false});

  // タッチ
  wrap.addEventListener('touchstart', e=>{
    if(e.touches.length===1) touchPrev={x:e.touches[0].clientX,y:e.touches[0].clientY,dist:0};
    else if(e.touches.length===2) {
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      touchPrev={...touchPrev,dist:Math.hypot(dx,dy)};
    }
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchmove', e=>{
    if(!touchPrev)return;
    if(e.touches.length===1) {
      const dx=e.touches[0].clientX-touchPrev.x, dy=e.touches[0].clientY-touchPrev.y;
      spherical.theta-=dx*0.008;
      spherical.phi=Math.max(0.1,Math.min(Math.PI-0.1,spherical.phi+dy*0.008));
      touchPrev={...touchPrev,x:e.touches[0].clientX,y:e.touches[0].clientY};
    } else if(e.touches.length===2) {
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.hypot(dx,dy);
      if(touchPrev.dist) spherical.radius=Math.max(0.1,spherical.radius*(touchPrev.dist/dist));
      touchPrev={...touchPrev,dist};
    }
    e.preventDefault();
  },{passive:false});
  wrap.addEventListener('touchend',()=>{ touchPrev=null; });
}

// ビューアコントロールボタン
document.getElementById('viewer-reset').addEventListener('click',()=>{
  spherical={theta:0.3,phi:1.2,radius:3};
  if(viewerModel){const box=new THREE.Box3().setFromObject(viewerModel);const size=box.getSize(new THREE.Vector3());const maxDim=Math.max(size.x,size.y,size.z);spherical.radius=maxDim*1.8;}
});
document.getElementById('viewer-wire').addEventListener('click',()=>{
  isWireframe=!isWireframe;
  document.getElementById('viewer-wire').textContent=isWireframe?'🎨 カラー':'📐 ワイヤー';
  if(viewerModel) viewerModel.traverse(child=>{
    if(child.isMesh) {
      if(Array.isArray(child.material)) child.material.forEach(m=>m.wireframe=isWireframe);
      else child.material.wireframe=isWireframe;
    }
  });
});
document.getElementById('viewer-auto').addEventListener('click',()=>{
  isAutoRotate=!isAutoRotate;
  document.getElementById('viewer-auto').textContent=isAutoRotate?'⏸ 停止':'▶ 自動回転';
});

// ─── AI 解析 ───
document.getElementById('btn-ai-analyze').addEventListener('click', async ()=>{
  const w=works.find(x=>x.id===currentDetailId); if(!w||!w.photos||!w.photos.length)return;
  const btn=document.getElementById('btn-ai-analyze');
  const spinner=document.getElementById('ai-spinner');
  const btnText=document.getElementById('ai-btn-text');
  const aiBody=document.getElementById('ai-body');
  btn.disabled=true; spinner.classList.add('show'); btnText.textContent='解析中…'; aiBody.textContent='📸 写真を解析しています…';
  try {
    const photoCount=Math.min(w.photos.length,2);
    const imageContents=[];
    for(let i=0;i<photoCount;i++){
      const [header,b64]=w.photos[i].split(',');
      const mt=header.match(/:(.*?);/)[1];
      imageContents.push({type:'image',source:{type:'base64',media_type:mt,data:b64}});
    }
    const pieceInfo=Object.keys(w.pieces||{}).length>0?`ピース情報: ${PIECE_TYPES.filter(p=>w.pieces[p.key]).map(p=>`${p.label}${w.pieces[p.key]}個`).join('、')}`:'';
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:1000,
        messages:[{role:'user',content:[...imageContents,{type:'text',text:`これはLaQ（ラキュー）というおもちゃで作られた作品の写真です。作品名: ${w.name}、カテゴリ: ${w.type||'不明'}、難易度: ${w.level||'不明'}。${pieceInfo}\n\n以下の観点で日本語で設計図解析レポートを書いてください（絵文字を使って親しみやすく）：\n1. 🏗 構造の特徴\n2. 🎨 色の傾向\n3. 🔑 再現のポイント\n4. ✨ 見どころ\n各項目を1〜2文で簡潔に。`}]}]
      })
    });
    const data=await resp.json();
    const text=data.content?.filter(c=>c.type==='text').map(c=>c.text).join('')||'解析できませんでした。';
    const html=text.replace(/\n/g,'<br>');
    aiBody.innerHTML=html; btnText.textContent='🔄 再解析する';
    const idx=works.findIndex(x=>x.id===currentDetailId);
    if(idx>=0){works[idx].aiAnalysis=html;saveWorks(works);}
  } catch(err){ aiBody.textContent=`解析に失敗しました: ${err.message}`; }
  finally{ btn.disabled=false; spinner.classList.remove('show'); }
});

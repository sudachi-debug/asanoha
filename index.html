<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻の葉文様 塗り絵</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f4ef;
    --panel-bg: #ffffff;
    --text: #2a2a2a;
    --accent: #1a3a6e;
    --border: #d8d0c4;
    --shadow: rgba(0,0,0,0.08);
  }

  body {
    background: var(--bg);
    font-family: 'Noto Serif JP', serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    gap: 20px;
  }

  header {
    text-align: center;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--accent);
  }
  header p {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    color: #888;
    margin-top: 4px;
  }

  .main-layout {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 1100px;
  }

  /* 上段：パネルを横並び */
  .panel-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  /* ===== コントロールパネル ===== */
  .panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    flex: 1;
    min-width: 180px;
    box-shadow: 0 2px 12px var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .panel-section h2 {
    font-size: 0.68rem;
    font-weight: 400;
    letter-spacing: 0.25em;
    color: #999;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
  }
  .control-row label {
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    color: #555;
    white-space: nowrap;
  }

  input[type="color"] {
    width: 42px;
    height: 30px;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px;
    cursor: pointer;
    background: none;
  }

  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .range-val {
    font-size: 0.75rem;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
  }

  /* パレット */
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px;
    margin-top: 4px;
  }
  .swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 3px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.1s;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active { border-color: #333; transform: scale(1.12); }

  /* ボタン */
  .btn {
    display: block;
    width: 100%;
    padding: 9px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--panel-bg);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    margin-bottom: 6px;
  }
  .btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #0f2750; }
  .btn.danger:hover { background: #c0392b; border-color: #c0392b; }

  /* モード切替 */
  .mode-btns {
    display: flex;
    gap: 6px;
  }
  .mode-btn {
    flex: 1;
    padding: 7px 4px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--panel-bg);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    color: #777;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .mode-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ===== データモーダル ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel-bg);
    border-radius: 6px;
    padding: 24px;
    width: min(90vw, 480px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .modal h3 {
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--accent);
  }
  .modal textarea {
    width: 100%;
    height: 120px;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px;
    font-size: 0.7rem;
    font-family: monospace;
    resize: vertical;
    color: #444;
  }
  .modal-note {
    font-size: 0.7rem;
    color: #999;
    letter-spacing: 0.05em;
    line-height: 1.6;
  }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns .btn { margin: 0; }

  /* ===== キャンバスエリア ===== */
  .canvas-outer {
    display: flex;
    align-items: stretch;
    gap: 8px;
    width: 100%;
  }
  .canvas-wrap {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 2px 20px var(--shadow);
    overflow: hidden;
    background: #fff;
    cursor: crosshair;
    flex: 1;
  }
  #canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  /* 縦ズームスライダー */
  .zoom-slider-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .zoom-icon { font-size: 1rem; line-height: 1; color: #aaa; cursor: default; user-select: none; }
  #zoomSlider {
    writing-mode: vertical-lr;
    direction: rtl;
    -webkit-appearance: slider-vertical;
    appearance: slider-vertical;
    width: 28px;
    height: 180px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .zoom-val {
    font-size: 0.68rem;
    color: var(--accent);
    letter-spacing: 0.04em;
  }

  /* ステータス */
  .status-bar {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: #bbb;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>麻の葉文様　塗り絵</h1>
  <p>ASANOHA PATTERN — COLORING BOOK</p>
</header>

<div class="main-layout">

  <!-- 上段：パネル横並び -->
  <div class="panel-row">

    <!-- 背景色・線スタイル -->
    <div class="panel">
      <div class="panel-section">
        <h2>背景色</h2>
        <div class="control-row">
          <label>色</label>
          <input type="color" id="bgColor" value="#ffffff" onchange="updateBgColor(this.value)">
        </div>
      </div>
      <div class="panel-section">
        <h2>線のスタイル</h2>
        <div class="control-row">
          <label>色</label>
          <input type="color" id="strokeColor" value="#1a3a6e" onchange="updateStyle()">
        </div>
        <div class="control-row">
          <label>太さ</label>
          <input type="range" id="strokeWidth" min="0.3" max="4" step="0.1" value="0.8" oninput="updateStyle(); document.getElementById('swVal').textContent=this.value">
          <span class="range-val" id="swVal">0.8</span>
        </div>
        <div style="margin-top:8px;">
          <button class="mode-btn" id="sharedLineBtn" onclick="toggleSharedLines()" style="width:100%">同色の仕切り線　表示</button>
        </div>
      </div>
    </div>

    <!-- 塗り色 -->
    <div class="panel">
      <div class="panel-section">
        <h2>塗り色</h2>
        <div class="palette-grid" id="palette"></div>
        <div class="control-row" style="margin-top:10px;">
          <label>カスタム</label>
          <input type="color" id="fillColor" value="#f0c040" onchange="setFillColor(this.value)">
        </div>
      </div>
    </div>

    <!-- 塗りモード -->
    <div class="panel">
      <div class="panel-section">
        <h2>モード</h2>
        <div class="mode-btns">
          <button class="mode-btn active" id="modeFill" onclick="setMode('fill')">🎨 塗る</button>
          <button class="mode-btn" id="modeErase" onclick="setMode('erase')">🧹 消す</button>
          <button class="mode-btn" id="modeLine" onclick="setMode('line')">✏️ 線</button>
        </div>
        <div id="lineColorRow" class="control-row" style="margin-top:10px; display:none;">
          <label>線の色</label>
          <input type="color" id="lineColor" value="#e84040">
        </div>
        <div id="lineEraseRow" style="margin-top:6px; display:none;">
          <button class="mode-btn" id="lineEraseBtn" onclick="toggleLineErase()" style="width:100%">色を塗る</button>
        </div>
      </div>
    </div>

  </div>

  <!-- 下段：キャンバス + ズームスライダー（上段と同幅） -->
  <div class="canvas-outer">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas" width="720" height="540"></canvas>
    </div>
    <div class="zoom-slider-wrap">
      <span class="zoom-icon">＋</span>
      <input type="range" id="zoomSlider" min="40" max="800" step="1" value="100"
             oninput="onZoomSlider(this.value)">
      <span class="zoom-icon">－</span>
      <span class="zoom-val" id="zoomVal">1.0×</span>
    </div>
  </div>

  <!-- 操作 -->
  <div class="panel-row">
    <div class="panel">
      <div class="panel-section">
        <h2>操作</h2>
        <button class="btn danger" onclick="clearAll()">リセット</button>
        <button class="btn primary" onclick="saveImage()">PNG 保存</button>
        <button class="btn" onclick="openSaveModal()">データ保存</button>
        <button class="btn" onclick="openLoadModal()">データ読み込み</button>
      </div>
    </div>
  </div>

  <!-- データ保存モーダル -->
  <div class="modal-overlay" id="saveModal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal">
      <h3>データ保存</h3>
      <p class="modal-note">下のテキストを全選択してコピーし、メモ帳などに貼り付けて保存してください。</p>
      <textarea id="saveText" readonly onclick="this.select()"></textarea>
      <div class="modal-btns">
        <button class="btn primary" onclick="copyData()">コピー</button>
        <button class="btn" onclick="document.getElementById('saveModal').classList.remove('open')">閉じる</button>
      </div>
    </div>
  </div>

  <!-- データ読み込みモーダル -->
  <div class="modal-overlay" id="loadModal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal">
      <h3>データ読み込み</h3>
      <p class="modal-note">保存したテキストをここに貼り付けて「読み込む」を押してください。</p>
      <textarea id="loadText" placeholder="ここにデータを貼り付け…"></textarea>
      <div class="modal-btns">
        <button class="btn primary" onclick="applyLoadData()">読み込む</button>
        <button class="btn" onclick="document.getElementById('loadModal').classList.remove('open')">閉じる</button>
      </div>
    </div>
  </div>

</div>

<div class="status-bar" id="statusBar">セルをクリック・ドラッグして色を塗れます</div>

<script>
// ===== 状態 =====
const CANVAS_W = 720, CANVAS_H = 540;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let strokeColor = '#1a3a6e';
let strokeWidth = 0.8;
let gridSize = 35;
let fillColor = '#f0c040';
let mode = 'fill';
let cellColors = {};
let bgColor = '#ffffff';
let hideSharedLines = false;

// 線塗りモード状態
let lineColors = {};   // edgeKey → color  辺ごとの色
let linePoint1 = null; // 1点目スナップ交点 {x,y}
let lineEraseMode = false; // true=消去, false=塗り

// 範囲塗りモード状態（旧range、互換のため残す）
let rangePoint1 = null;
let rangePoint2 = null;

// ズーム・パン状態
let viewScale = 1.0;
let viewOffsetX = 0;
let viewOffsetY = 0;
const SCALE_MIN = 0.4;
const SCALE_MAX = 8.0;

// タッチ/マウス状態
let isPointerDown = false;
let lastPointerX = 0, lastPointerY = 0;
let didPan = false;
// 最後にタップ/クリックした画面座標（ズームの中心点として使用）
let lastTapSx = 360, lastTapSy = 270;

// ===== パレット =====
const PALETTE = [
  '#ffffff','#f7f4ef','#fce4b0','#f0c040','#e88020',
  '#e84040','#c0384c','#a0205c','#7030a0','#3050c8',
  '#1a3a6e','#0080b0','#20b0a0','#40a040','#80c040',
  '#c8e060','#ffdd88','#f8b8a0','#e0a0c0','#b0b0b0',
  '#808080','#404040','#1a1a1a','#8b4513','#d2691e',
];

function buildPalette() {
  const g = document.getElementById('palette');
  g.innerHTML = '';
  PALETTE.forEach((c, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i === 3 ? ' active' : '');
    s.style.background = c;
    s.style.border = c === '#ffffff' ? '2px solid #ccc' : '2px solid transparent';
    s.title = c;
    s.onclick = () => {
      document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active');
      setFillColor(c);
    };
    g.appendChild(s);
  });
}

function setFillColor(c) {
  fillColor = c;
  document.getElementById('fillColor').value = c;
  setMode('fill');
}

function setMode(m) {
  mode = m;
  document.getElementById('modeFill').classList.toggle('active', m === 'fill');
  document.getElementById('modeErase').classList.toggle('active', m === 'erase');
  document.getElementById('modeLine').classList.toggle('active', m === 'line');
  document.getElementById('lineColorRow').style.display = m === 'line' ? 'flex' : 'none';
  document.getElementById('lineEraseRow').style.display = m === 'line' ? 'block' : 'none';
  if (m !== 'line') { linePoint1 = null; }
  if (m !== 'range') { rangePoint1 = null; rangePoint2 = null; }
  redraw();
}

function toggleLineErase() {
  lineEraseMode = !lineEraseMode;
  const btn = document.getElementById('lineEraseBtn');
  btn.textContent = lineEraseMode ? '線を消す' : '色を塗る';
  btn.classList.toggle('active', lineEraseMode);
}

function toggleSharedLines() {
  hideSharedLines = !hideSharedLines;
  const btn = document.getElementById('sharedLineBtn');
  btn.textContent = hideSharedLines ? '同色の仕切り線　非表示' : '同色の仕切り線　表示';
  btn.classList.toggle('active', hideSharedLines);
  redraw();
}

function updateBgColor(c) {
  bgColor = c;
  redraw();
}

function updateStyle() {
  strokeColor = document.getElementById('strokeColor').value;
  strokeWidth = parseFloat(document.getElementById('strokeWidth').value);
  redraw();
}

// ===== 麻の葉パターン生成 =====
// 麻の葉は正六角形を基礎に、六芒星状の線で各セルを区画する
// ここでは各「花形セル」を塗り絵の単位とする
// 花形セルは6つの菱形領域（petals）で構成

function getAsanohaLayout(R) {
  // R = 六角グリッドの外接円半径
  // 各六角形の中心を格子状に並べる
  // 麻の葉は正三角形タイリングがベース
  // セルの種類: hexagon(中央六角形), rhombus(菱形)
  // ここでは「塗り区画」を菱形 + 小六角形とする
}

// --- 描画核心 ---
// 麻の葉の構造:
//   正六角形を R で定義し、その頂点同士と中心を結ぶことで
//   6枚の「凧形（kite）」ができる。それが塗り単位。
//   さらに隣接六角形の間の「斜め菱形」も塗り単位。

function hexCenter(col, row, R) {
  // flat-top hex grid
  const w = R * Math.sqrt(3);
  const h = R * 2;
  const x = col * w + (row % 2 === 0 ? 0 : w / 2);
  const y = row * h * 0.75;
  return { x, y };
}

function hexVertices(cx, cy, R) {
  // flat-top: angles 0,60,120,180,240,300 → shifted by 30 → 30,90,150,210,270,330
  return Array.from({ length: 6 }, (_, i) => {
    const a = (Math.PI / 180) * (60 * i - 30);
    return { x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) };
  });
}

// 塗り区画の計算
// 麻の葉の線: 中心→各頂点(6本) + 中心→各辺中点(6本) = 12本の放射線
// これにより六角形は12個の三角形に分割される
// 三角形(i*2)  : 中心 - 頂点i    - 辺中点i
// 三角形(i*2+1): 中心 - 辺中点i  - 頂点(i+1)

function getTriangles(cx, cy, R) {
  const verts = hexVertices(cx, cy, R);
  const tris = [];
  for (let i = 0; i < 6; i++) {
    const v0 = verts[i];
    const v1 = verts[(i + 1) % 6];
    const mid = { x: (v0.x + v1.x) / 2, y: (v0.y + v1.y) / 2 };
    tris.push([{ x: cx, y: cy }, v0, mid]);
    tris.push([{ x: cx, y: cy }, mid, v1]);
  }
  return tris;
}

// セル識別子
function kiteId(col, row, k) { return `${col}_${row}_${k}`; }

// 可視グリッド範囲（パン・ズーム後も正確に）
function getVisibleRange() {
  const R = gridSize;
  const corners = [
    screenToWorld(0, 0), screenToWorld(CANVAS_W, 0),
    screenToWorld(0, CANVAS_H), screenToWorld(CANVAS_W, CANVAS_H),
  ];
  const wx0 = Math.min(...corners.map(c => c.x));
  const wx1 = Math.max(...corners.map(c => c.x));
  const wy0 = Math.min(...corners.map(c => c.y));
  const wy1 = Math.max(...corners.map(c => c.y));
  const w = R * Math.sqrt(3);
  const h = R * 1.5;
  return {
    colMin: Math.floor(wx0 / w) - 2,
    colMax: Math.ceil(wx1 / w) + 2,
    rowMin: Math.floor(wy0 / h) - 2,
    rowMax: Math.ceil(wy1 / h) + 2,
  };
}

// 全セルを取得
function getAllCells() {
  const R = gridSize;
  const { colMin, colMax, rowMin, rowMax } = getVisibleRange();
  const cells = [];
  for (let row = rowMin; row <= rowMax; row++) {
    for (let col = colMin; col <= colMax; col++) {
      const { x, y } = hexCenter(col, row, R);
      const tris = getTriangles(x, y, R);
      tris.forEach((poly, k) => {
        cells.push({ id: kiteId(col, row, k), poly, col, row, k });
      });
    }
  }
  return cells;
}

// ===== 描画 =====
let cells = [];

function redraw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // 背景
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.save();
  ctx.translate(viewOffsetX, viewOffsetY);
  ctx.scale(viewScale, viewScale);

  cells = getAllCells();

  // 塗り
  cells.forEach(cell => {
    const color = cellColors[cell.id];
    if (color) fillCell(cell.poly, color);
  });

  // 線
  drawLines();

  // hideSharedLines ON時：同色境界を塗り色で上塗りして線を完全に消す
  if (hideSharedLines) overPaintSharedBorders();

  // 辺の個別色
  drawLineColors();

  // 範囲塗りオーバーレイ
  drawRangeOverlay();

  // 線塗りオーバーレイ
  drawLineOverlay();

  ctx.restore();
}

function fillCell(poly, color) {
  ctx.beginPath();
  ctx.moveTo(poly[0].x, poly[0].y);
  poly.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

// 同色隣接セルを塗り色でfillして線を完全に消す（stroke上塗りではなくfill方式）
function overPaintSharedBorders() {
  if (!hideSharedLines) return;

  // 辺キー → [{cellId, poly, color}] のマップを構築
  function ptKey(x, y) {
    return `${Math.round(x * 100)},${Math.round(y * 100)}`;
  }
  function edgeKey(ax, ay, bx, by) {
    const ka = ptKey(ax, ay), kb = ptKey(bx, by);
    return ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
  }

  const edgeMap = new Map();
  cells.forEach(cell => {
    const c = cellColors[cell.id];
    if (!c) return;
    const poly = cell.poly;
    for (let i = 0; i < 3; i++) {
      const a = poly[i], b = poly[(i + 1) % 3];
      const ek = edgeKey(a.x, a.y, b.x, b.y);
      if (!edgeMap.has(ek)) edgeMap.set(ek, []);
      edgeMap.get(ek).push(cell);
    }
  });

  // 同じ辺を共有する2セルが同色 → 2つの三角形をまとめてfill
  edgeMap.forEach(list => {
    if (list.length !== 2) return;
    const ca = cellColors[list[0].id];
    const cb = cellColors[list[1].id];
    if (!ca || !cb || ca !== cb) return;

    // 2つの三角形の全頂点（重複なし）を集めて凸多角形としてfill
    const pts = [...list[0].poly, ...list[1].poly];
    // 重複点を除去
    const unique = [];
    pts.forEach(p => {
      if (!unique.some(u => Math.abs(u.x - p.x) < 0.02 && Math.abs(u.y - p.y) < 0.02)) {
        unique.push(p);
      }
    });
    // 重心周りに角度でソートして凸順に並べる
    const cx = unique.reduce((s, p) => s + p.x, 0) / unique.length;
    const cy = unique.reduce((s, p) => s + p.y, 0) / unique.length;
    unique.sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));

    ctx.beginPath();
    ctx.moveTo(unique[0].x, unique[0].y);
    unique.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
    ctx.closePath();
    ctx.fillStyle = ca;
    ctx.fill();
  });
}

function drawLines() {
  const R = gridSize;
  const { colMin, colMax, rowMin, rowMax } = getVisibleRange();

  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = strokeWidth / viewScale;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  for (let row = rowMin; row <= rowMax; row++) {
    for (let col = colMin; col <= colMax; col++) {
      const { x, y } = hexCenter(col, row, R);
      drawAsanohaCell(x, y, R);
    }
  }
}

function drawAsanohaCell(cx, cy, R) {
  const verts = hexVertices(cx, cy, R);
  // 外周
  ctx.beginPath();
  ctx.moveTo(verts[0].x, verts[0].y);
  for (let i = 1; i < 6; i++) ctx.lineTo(verts[i].x, verts[i].y);
  ctx.closePath();
  ctx.stroke();
  // 中心から各頂点・各辺中点へ
  for (let i = 0; i < 6; i++) {
    const v0 = verts[i], v1 = verts[(i + 1) % 6];
    const mid = { x: (v0.x + v1.x) / 2, y: (v0.y + v1.y) / 2 };
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(v0.x, v0.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(mid.x, mid.y); ctx.stroke();
  }
}

// 外周辺iの隣接六角形と対応するtriインデックスを返す
function getHexNeighborOffset(col, row) {
  const odd = row % 2 !== 0;
  return [
    odd ? [1, -1] : [0, -1],
    odd ? [1,  0] : [1,  0],
    odd ? [1,  1] : [0,  1],
    odd ? [0,  1] : [-1, 1],
    odd ? [-1, 0] : [-1, 0],
    odd ? [-1,-1] : [-1,-1],
  ];
}

function neighborTri(col, row, i, side) {
  const [dc, dr] = getHexNeighborOffset(col, row)[i];
  const oppI = (i + 3) % 6;
  const nk = side === 'a' ? oppI * 2 + 1 : oppI * 2;
  return [col + dc, row + dr, nk];
}

// ===== ヒットテスト =====
function pointInPoly(px, py, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y;
    const xj = poly[j].x, yj = poly[j].y;
    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// ===== 座標変換 =====
// スクリーン座標 → ワールド座標（ctx変換前の座標系）
function screenToWorld(sx, sy) {
  return {
    x: (sx - viewOffsetX) / viewScale,
    y: (sy - viewOffsetY) / viewScale,
  };
}

function getScreenPos(e, index = 0) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  const scaleY = CANVAS_H / rect.height;
  const src = e.touches ? e.touches[index] : e;
  return {
    sx: (src.clientX - rect.left) * scaleX,
    sy: (src.clientY - rect.top) * scaleY,
  };
}

// ===== 塗り =====
function paintAt(sx, sy) {
  const { x, y } = screenToWorld(sx, sy);
  const cell = cells.find(c => pointInPoly(x, y, c.poly));
  if (!cell) return;
  if (mode === 'fill') {
    if (cellColors[cell.id] === fillColor) return;
    cellColors[cell.id] = fillColor;
  } else {
    if (!cellColors[cell.id]) return;
    delete cellColors[cell.id];
  }
  redraw();
}

// ===== 線塗りモード =====

function edgePtKey(x, y) {
  return `${Math.round(x * 10)},${Math.round(y * 10)}`;
}
function makeEdgeKey(ax, ay, bx, by) {
  const ka = edgePtKey(ax, ay), kb = edgePtKey(bx, by);
  return ka < kb ? `${ka}|${kb}` : `${kb}|${ka}`;
}

// 全交点と隣接辺のグラフを構築（BFS用）
function buildNodeGraph() {
  const R = gridSize;
  // node key → 隣接 node key のセット
  const graph = new Map(); // nodeKey → Set<nodeKey>
  const nodePos = new Map(); // nodeKey → {x,y}

  const addEdge = (ax, ay, bx, by) => {
    const ka = edgePtKey(ax, ay), kb = edgePtKey(bx, by);
    nodePos.set(ka, { x: ax, y: ay });
    nodePos.set(kb, { x: bx, y: by });
    if (!graph.has(ka)) graph.set(ka, new Set());
    if (!graph.has(kb)) graph.set(kb, new Set());
    graph.get(ka).add(kb);
    graph.get(kb).add(ka);
  };

  const { colMin, colMax, rowMin, rowMax } = getVisibleRange();
  // 可視範囲を少し広げて確実に2点を含む
  for (let row = rowMin - 1; row <= rowMax + 1; row++) {
    for (let col = colMin - 1; col <= colMax + 1; col++) {
      const { x: cx, y: cy } = hexCenter(col, row, R);
      const verts = hexVertices(cx, cy, R);
      for (let i = 0; i < 6; i++) {
        const v0 = verts[i], v1 = verts[(i + 1) % 6];
        const mid = { x: (v0.x + v1.x) / 2, y: (v0.y + v1.y) / 2 };
        addEdge(cx, cy, v0.x, v0.y);
        addEdge(cx, cy, mid.x, mid.y);
        addEdge(v0.x, v0.y, mid.x, mid.y);
        addEdge(mid.x, mid.y, v1.x, v1.y);
      }
    }
  }
  return { graph, nodePos };
}

// BFS で2交点間の最短辺列を返す [{ax,ay,bx,by}, ...]
function findLinePath(p1, p2) {
  const { graph, nodePos } = buildNodeGraph();
  const startKey = edgePtKey(p1.x, p1.y);
  const goalKey  = edgePtKey(p2.x, p2.y);
  if (startKey === goalKey) return [];
  if (!graph.has(startKey) || !graph.has(goalKey)) return [];

  const prev = new Map();
  const queue = [startKey];
  prev.set(startKey, null);
  while (queue.length) {
    const cur = queue.shift();
    if (cur === goalKey) break;
    for (const nb of graph.get(cur)) {
      if (!prev.has(nb)) { prev.set(nb, cur); queue.push(nb); }
    }
  }
  if (!prev.has(goalKey)) return [];

  // パスを逆順に復元
  const path = [];
  let cur = goalKey;
  while (prev.get(cur) !== null) {
    const p = prev.get(cur);
    const posA = nodePos.get(p), posB = nodePos.get(cur);
    path.unshift({ ax: posA.x, ay: posA.y, bx: posB.x, by: posB.y });
    cur = p;
  }
  return path;
}

function lineTap(sx, sy) {
  const { x: wx, y: wy } = screenToWorld(sx, sy);
  const node = snapToNode(wx, wy);
  if (!linePoint1) {
    linePoint1 = node;
    redraw();
  } else {
    const path = findLinePath(linePoint1, node);
    const lc = document.getElementById('lineColor').value;
    path.forEach(seg => {
      const ek = makeEdgeKey(seg.ax, seg.ay, seg.bx, seg.by);
      if (lineEraseMode) delete lineColors[ek];
      else lineColors[ek] = lc;
    });
    linePoint1 = null;
    redraw();
  }
}

function drawLineColors() {
  if (Object.keys(lineColors).length === 0) return;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.lineWidth = (strokeWidth * 3) / viewScale;

  // 色ごとにまとめて描画
  const byColor = new Map();
  Object.entries(lineColors).forEach(([ek, c]) => {
    if (!byColor.has(c)) byColor.set(c, []);
    byColor.get(c).push(ek);
  });

  byColor.forEach((keys, c) => {
    ctx.strokeStyle = c;
    keys.forEach(ek => {
      const parts = ek.split('|');
      const [ax, ay] = parts[0].split(',').map(v => parseFloat(v) / 10);
      const [bx, by] = parts[1].split(',').map(v => parseFloat(v) / 10);
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
    });
  });
}

function drawLineOverlay() {
  if (mode !== 'line' || !linePoint1) return;
  ctx.save();
  ctx.fillStyle = '#e84040';
  ctx.beginPath();
  ctx.arc(linePoint1.x, linePoint1.y, 7 / viewScale, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ===== 範囲塗りモード =====

// ワールド座標(wx,wy)に最も近い交点を返す
// 交点 = 六角形の中心・頂点・辺中点
function snapToNode(wx, wy) {
  const R = gridSize;
  let best = null, bestDist = Infinity;

  const check = (x, y) => {
    const d = (x - wx) ** 2 + (y - wy) ** 2;
    if (d < bestDist) { bestDist = d; best = { x, y }; }
  };

  // 近傍の六角形のみチェック
  const w = R * Math.sqrt(3), h = R * 1.5;
  const col0 = Math.floor(wx / w) - 2, col1 = Math.ceil(wx / w) + 2;
  const row0 = Math.floor(wy / h) - 2, row1 = Math.ceil(wy / h) + 2;

  for (let row = row0; row <= row1; row++) {
    for (let col = col0; col <= col1; col++) {
      const { x: cx, y: cy } = hexCenter(col, row, R);
      check(cx, cy); // 中心
      const verts = hexVertices(cx, cy, R);
      verts.forEach((v, i) => {
        check(v.x, v.y); // 頂点
        const v1 = verts[(i + 1) % 6];
        check((v.x + v1.x) / 2, (v.y + v1.y) / 2); // 辺中点
      });
    }
  }
  return best;
}

// 2交点を対角とする矩形内のセルを一括塗り
function applyRangeFill() {
  if (!rangePoint1 || !rangePoint2) return;
  const x0 = Math.min(rangePoint1.x, rangePoint2.x);
  const x1 = Math.max(rangePoint1.x, rangePoint2.x);
  const y0 = Math.min(rangePoint1.y, rangePoint2.y);
  const y1 = Math.max(rangePoint1.y, rangePoint2.y);

  cells.forEach(cell => {
    // セルの重心が矩形内なら塗る
    const cx = (cell.poly[0].x + cell.poly[1].x + cell.poly[2].x) / 3;
    const cy = (cell.poly[0].y + cell.poly[1].y + cell.poly[2].y) / 3;
    if (cx >= x0 && cx <= x1 && cy >= y0 && cy <= y1) {
      if (mode === 'range') cellColors[cell.id] = fillColor;
    }
  });
  rangePoint1 = null;
  rangePoint2 = null;
  redraw();
}

// 範囲モードのタップ処理
function rangeTap(sx, sy) {
  const { x: wx, y: wy } = screenToWorld(sx, sy);
  const node = snapToNode(wx, wy);
  if (!rangePoint1) {
    rangePoint1 = node;
    redraw();
  } else {
    rangePoint2 = node;
    applyRangeFill();
  }
}

// 選択中の交点と矩形プレビューを描画
function drawRangeOverlay() {
  if (mode !== 'range' || !rangePoint1) return;
  ctx.save();
  // 選択点1
  ctx.fillStyle = '#e84040';
  ctx.beginPath();
  ctx.arc(rangePoint1.x, rangePoint1.y, 6 / viewScale, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}
function onZoomSlider(val) {
  const newScale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, val / 100));
  // 最後にタップした点を中心にズーム
  viewOffsetX = lastTapSx - (lastTapSx - viewOffsetX) * (newScale / viewScale);
  viewOffsetY = lastTapSy - (lastTapSy - viewOffsetY) * (newScale / viewScale);
  viewScale = newScale;
  document.getElementById('zoomVal').textContent = newScale.toFixed(1) + '×';
  redraw();
}

// ===== マウスイベント =====
canvas.addEventListener('mousedown', e => {
  isPointerDown = true;
  didPan = false;
  const { sx, sy } = getScreenPos(e);
  lastPointerX = sx;
  lastPointerY = sy;
  lastTapSx = sx;
  lastTapSy = sy;
});
canvas.addEventListener('mousemove', e => {
  if (!isPointerDown) return;
  const { sx, sy } = getScreenPos(e);
  const dx = sx - lastPointerX, dy = sy - lastPointerY;
  if (!didPan && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) didPan = true;
  if (didPan) {
    viewOffsetX += dx;
    viewOffsetY += dy;
    lastPointerX = sx;
    lastPointerY = sy;
    redraw();
  }
});
canvas.addEventListener('mouseup', e => {
  if (!didPan) {
    const { sx, sy } = getScreenPos(e);
    if (mode === 'range') rangeTap(sx, sy);
    else if (mode === 'line') lineTap(sx, sy);
    else paintAt(sx, sy);
  }
  isPointerDown = false;
  didPan = false;
});
canvas.addEventListener('mouseleave', () => { isPointerDown = false; didPan = false; });

// マウスホイールズーム（最後タップ位置中心）
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, viewScale * factor));
  viewOffsetX = lastTapSx - (lastTapSx - viewOffsetX) * (newScale / viewScale);
  viewOffsetY = lastTapSy - (lastTapSy - viewOffsetY) * (newScale / viewScale);
  viewScale = newScale;
  document.getElementById('zoomSlider').value = Math.round(viewScale * 100);
  document.getElementById('zoomVal').textContent = viewScale.toFixed(1) + '×';
  redraw();
}, { passive: false });

// ===== タッチイベント（ピンチなし・1本指のみ）=====
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    isPointerDown = true;
    didPan = false;
    const { sx, sy } = getScreenPos(e);
    lastPointerX = sx;
    lastPointerY = sy;
    lastTapSx = sx;
    lastTapSy = sy;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isPointerDown || e.touches.length !== 1) return;
  const { sx, sy } = getScreenPos(e);
  const dx = sx - lastPointerX, dy = sy - lastPointerY;
  if (!didPan && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) didPan = true;
  if (didPan) {
    viewOffsetX += dx;
    viewOffsetY += dy;
    lastPointerX = sx;
    lastPointerY = sy;
    redraw();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length === 0 && isPointerDown && !didPan) {
    if (mode === 'range') rangeTap(lastPointerX, lastPointerY);
    else if (mode === 'line') lineTap(lastPointerX, lastPointerY);
    else paintAt(lastPointerX, lastPointerY);
  }
  isPointerDown = false;
  didPan = false;
}, { passive: false });

function clearAll() {
  cellColors = {};
  lineColors = {};
  redraw();
}

function saveImage() {
  const link = document.createElement('a');
  link.download = '麻の葉塗り絵.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function openSaveModal() {
  const data = JSON.stringify({ cellColors, lineColors, gridSize, viewScale, viewOffsetX, viewOffsetY });
  document.getElementById('saveText').value = data;
  document.getElementById('saveModal').classList.add('open');
  // 少し遅らせて全選択
  setTimeout(() => document.getElementById('saveText').select(), 100);
}

function copyData() {
  const ta = document.getElementById('saveText');
  ta.select();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(ta.value).then(() => alert('コピーしました'));
  } else {
    document.execCommand('copy');
    alert('コピーしました');
  }
}

function openLoadModal() {
  document.getElementById('loadText').value = '';
  document.getElementById('loadModal').classList.add('open');
}

function applyLoadData() {
  try {
    const data = JSON.parse(document.getElementById('loadText').value.trim());
    cellColors = data.cellColors || {};
    lineColors = data.lineColors || {};
    if (data.gridSize) gridSize = data.gridSize;
    if (data.viewScale) viewScale = data.viewScale;
    if (data.viewOffsetX !== undefined) viewOffsetX = data.viewOffsetX;
    if (data.viewOffsetY !== undefined) viewOffsetY = data.viewOffsetY;
    document.getElementById('zoomSlider').value = Math.round(viewScale * 100);
    document.getElementById('zoomVal').textContent = viewScale.toFixed(1) + '×';
    document.getElementById('loadModal').classList.remove('open');
    redraw();
  } catch {
    alert('読み込みに失敗しました。データを確認してください。');
  }
}

// ===== 初期化 =====
buildPalette();
redraw();
</script>
</body>
